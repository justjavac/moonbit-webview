name: ci

on: [push, pull_request]

jobs:
  stable:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: install
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install on windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Linux native dependencies
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: moon version
        run: |
          moon version --all

      - name: moon update
        run: |
          moon update

      - name: format check
        run: |
          moon fmt --check

      - name: moon check
        if: ${{ matrix.os != 'windows-latest' }}
        run: moon check --target native --deny-warn

      - name: moon check (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: moon check --target native --deny-warn

      - name: runtime check
        if: ${{ matrix.os != 'windows-latest' }}
        run: moon -C runtime check --target native --deny-warn

      - name: runtime check (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: moon -C runtime check --target native --deny-warn

      - name: extensions test
        if: ${{ matrix.os != 'windows-latest' }}
        run: moon -C extensions test --target native

      - name: extensions test (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: moon -C extensions test --target native

      - name: Setup MSVC
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Run root integration tests (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          moon -C test test --target native

      - name: Compile root integration package (non-windows)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          moon -C test check --target native

      - name: Run standalone Windows-native module tests
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          moon -C notification test --target native
          moon -C tray test --target native
          moon -C global_hotkey test --target native

      - name: examples build
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          moon -C examples build --target native

      - name: examples build (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          moon -C examples build --target native

      - name: check core size on windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: Get-ChildItem -Path ".\examples\target" -Recurse -Filter "*.exe" | ForEach-Object { "{0} ({1} bytes)" -f $_.FullName, $_.Length }

      - name: check native binary size on unix
        if: ${{ matrix.os != 'windows-latest' }}
        run: find ./examples/target -type f | xargs ls -lh

  nightly:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    continue-on-error: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install on windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          MOONBIT_INSTALL_VERSION: nightly
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Linux native dependencies
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: moon version
        run: |
          moon version --all

      - name: moon update
        run: |
          moon update

      - name: Setup MSVC
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: moon check
        if: ${{ matrix.os != 'windows-latest' }}
        run: moon check --target native

      - name: moon check (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          moon check --target native

      - name: runtime check
        if: ${{ matrix.os != 'windows-latest' }}
        run: moon -C runtime check --target native

      - name: runtime check (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: moon -C runtime check --target native

      - name: extensions test
        if: ${{ matrix.os != 'windows-latest' }}
        run: moon -C extensions test --target native

      - name: extensions test (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: moon -C extensions test --target native

      - name: Run root integration tests (windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          moon -C test test --target native

      - name: Compile root integration package (non-windows)
        if: ${{ matrix.os != 'windows-latest' }}
        run: moon -C test check --target native

      - name: Run standalone Windows-native module tests
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          moon -C notification test --target native
          moon -C tray test --target native
          moon -C global_hotkey test --target native

      - name: format check
        run: |
