<html>
    <head>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background:
                    radial-gradient(circle at top, #f7f1d9 0%, transparent 42%),
                    linear-gradient(160deg, #dce9f4 0%, #f6efe4 100%);
                color: #14212b;
                font-family: "Avenir Next", "Gill Sans", sans-serif;
            }
            main {
                width: min(34rem, calc(100vw - 3rem));
                padding: 2rem;
                border-radius: 22px;
                background: rgba(255, 255, 255, 0.84);
                box-shadow: 0 24px 70px rgba(20, 33, 43, 0.14);
            }
            button {
                border: 0;
                border-radius: 999px;
                padding: 0.85rem 1.2rem;
                background: #14212b;
                color: white;
                font: inherit;
                cursor: pointer;
            }
            input {
                width: 100%;
                padding: 0.5rem 0.75rem;
                border-radius: 6px;
                border: 1px solid #ccc;
                font: inherit;
            }
            pre {
                margin-top: 1rem;
                padding: 1rem;
                border-radius: 14px;
                background: #eef3f7;
                white-space: pre-wrap;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Plugin FS API</h1>
            <p>Read file contents through a simple in-app plugin interface.</p>
            <input id="path" placeholder="/README.md" />
            <button id="read">Read File</button>
            <pre id="output">Enter a path and click Read File</pre>
        </main>
        <script>
            const output = document.getElementById("output");
            document.getElementById("read").addEventListener("click", () => {
                const path =
                    document.getElementById("path").value || "/README.md";
                window.MoonBitPlugins.fs
                    .read({ path: path })
                    .then((response) => {
                        output.textContent = "Content:\n" + response.content;
                    })
                    .catch((error) => {
                        output.textContent =
                            "Transport error:\n" + String(error);
                    });
            });
        </script>
    </body>
</html>
