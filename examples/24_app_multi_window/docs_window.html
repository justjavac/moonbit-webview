<html>
  <head>
    <meta charset="UTF-8" />
    <title>__MoonBit__ Multi-Window Docs</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7fafc;
        --ink: #0f172a;
        --muted: #475569;
        --accent: #0f766e;
        --line: rgba(15, 23, 42, 0.1);
        --panel: rgba(255, 255, 255, 0.92);
        --splash: rgba(15, 118, 110, 0.09);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f141a;
          --ink: #edf2f7;
          --muted: #9fb0c0;
          --accent: #34d399;
          --line: rgba(237, 242, 247, 0.12);
          --panel: rgba(17, 24, 32, 0.92);
          --splash: rgba(52, 211, 153, 0.14);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, var(--splash), transparent 26%),
          var(--bg);
      }

      main {
        width: min(720px, calc(100vw - 40px));
        margin: 32px auto;
        padding: 28px;
        background: var(--panel);
        border: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 14px;
        font-size: 2rem;
        letter-spacing: -0.03em;
      }

      ul {
        margin: 16px 0 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.7;
      }

      code {
        font-family: "Cascadia Code", monospace;
        font-size: 0.92em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Secondary window</h1>
      <p>This window is configured through <code>AppWindowConfig</code>.</p>
      <ul>
        <li>Use <code>App::windows()</code> to enumerate registered windows.</li>
        <li>Use <code>App::window("docs")</code> to target a specific window.</li>
        <li>Use <code>App::install_extension(...)</code> to expose runtime extensions across all windows.</li>
      </ul>
    </main>
  </body>
</html>
