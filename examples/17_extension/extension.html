<html>
  <head>
    <style>
      :root {
        color-scheme: light dark;
        --bg-top: #f7f1d9;
        --bg-start: #dce9f4;
        --bg-end: #f6efe4;
        --ink: #14212b;
        --panel: rgba(255, 255, 255, 0.84);
        --panel-shadow: rgba(20, 33, 43, 0.14);
        --button: #14212b;
        --button-ink: #ffffff;
        --code: #eef3f7;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-top: rgba(15, 118, 110, 0.36);
          --bg-start: #0f1820;
          --bg-end: #141a25;
          --ink: #edf3f7;
          --panel: rgba(16, 24, 31, 0.9);
          --panel-shadow: rgba(0, 0, 0, 0.4);
          --button: #34d399;
          --button-ink: #072018;
          --code: #111a22;
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, var(--bg-top) 0%, transparent 42%),
          linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
        color: var(--ink);
        font-family: "Avenir Next", "Gill Sans", sans-serif;
      }
      main {
        width: min(34rem, calc(100vw - 3rem));
        padding: 2rem;
        border-radius: 22px;
        background: var(--panel);
        box-shadow: 0 24px 70px var(--panel-shadow);
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.2rem;
        background: var(--button);
        color: var(--button-ink);
        font: inherit;
        cursor: pointer;
      }
      pre {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 14px;
        background: var(--code);
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Extension API</h1>
      <p>A __MoonBit__ extension registers ops-backed APIs on <code>window.__MoonBit__</code>, with events delivered through <code>window.__MoonBit__.events</code>.</p>
      <button id="run">Call math.sum</button>
      <pre id="output">Click the button.</pre>
    </main>
    <script>
      const output = document.getElementById("output");
      let lastEvent = null;
      window.__MoonBit__.events.on("math.computed", (event) => {
        lastEvent = event;
        output.textContent =
          "Extension event:\n" + JSON.stringify(event, null, 2);
      });
      document.getElementById("run").addEventListener("click", () => {
        Promise.all([
          window.__MoonBit__.core.ops.op_math_sum({ left: 20, right: 22 }),
          window.__MoonBit__.math.sum({ left: 20, right: 22 }),
        ])
          .then(([direct, extension]) => {
            output.textContent =
              "Direct op response:\n" + JSON.stringify(direct, null, 2) +
              "\n\nExtension helper response:\n" + JSON.stringify(extensionReply, null, 2) +
              "\n\nLast event:\n" + JSON.stringify(lastEvent, null, 2);
          })
          .catch((error) => {
            output.textContent = "Transport error:\n" + String(error);
          });
      });
    </script>
  </body>
</html>
