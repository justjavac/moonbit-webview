<html>
  <head>
    <meta charset="UTF-8" />
    <title>__MoonBit__ System Runtime</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f0e8;
        --panel: rgba(255, 252, 248, 0.92);
        --ink: #1f1d1a;
        --muted: #645e56;
        --accent: #0f766e;
        --accent-2: #9a3412;
        --line: rgba(31, 29, 26, 0.12);
        --field: #ffffff;
        --shadow: rgba(34, 27, 21, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #12171c;
          --panel: rgba(18, 24, 29, 0.92);
          --ink: #edf2f7;
          --muted: #a7b0b8;
          --accent: #34d399;
          --accent-2: #fb923c;
          --line: rgba(237, 242, 247, 0.12);
          --field: #0f1419;
          --shadow: rgba(0, 0, 0, 0.38);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.14), transparent 28%),
          radial-gradient(circle at bottom left, rgba(154, 52, 18, 0.12), transparent 32%),
          var(--bg);
      }

      main {
        width: min(1120px, calc(100vw - 40px));
        margin: 26px auto 40px;
        padding: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.4rem, 4vw, 4.1rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .lead {
        margin: 0 0 22px;
        max-width: 70ch;
        color: var(--muted);
        line-height: 1.6;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(300px, 0.85fr);
        gap: 20px;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .panel {
        padding: 18px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 18px 48px var(--shadow);
      }

      .panel h2 {
        margin: 0 0 14px;
        font-size: 1.05rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      input,
      textarea {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid var(--line);
        background: var(--field);
        font: inherit;
        color: var(--ink);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        padding: 11px 15px;
        font: inherit;
        color: white;
        background: var(--accent);
        cursor: pointer;
      }

      button.secondary {
        background: var(--accent-2);
      }

      code,
      pre {
        font-family: "Cascadia Code", monospace;
      }

      .status {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.6;
      }

      #event-log {
        margin: 0;
        padding-left: 20px;
        line-height: 1.6;
        color: var(--muted);
      }

      #event-log li + li {
        margin-top: 6px;
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>System extensions under one runtime.</h1>
      <p class="lead">
        This example exercises <code>notification</code>, <code>tray</code>,
        and <code>globalHotkey</code> through <code>window.__MoonBit__</code>.
        On Windows, try registering <code>Ctrl+Shift+K</code>, then press it
        while the app is focused elsewhere.
      </p>
      <section class="layout">
        <div class="stack">
          <article class="panel">
            <h2>Notification</h2>
            <div class="field-grid">
              <label>
                Title
                <input id="notification-title" value="__MoonBit__ Runtime" />
              </label>
              <label>
                Level
                <input id="notification-level" value="warning" />
              </label>
            </div>
            <label style="margin-top: 12px;">
              Body
              <textarea id="notification-body">Notification, tray, and global hotkey ops are active.</textarea>
            </label>
            <div class="actions">
              <button id="show-notification">Show Notification</button>
            </div>
          </article>

          <article class="panel">
            <h2>Tray</h2>
            <label>
              Tooltip
              <input id="tray-tooltip" value="__MoonBit__ system runtime is active" />
            </label>
            <div class="actions">
              <button id="show-tray">Show Tray</button>
              <button class="secondary" id="set-tray-tooltip">Update Tooltip</button>
              <button class="secondary" id="hide-tray">Hide Tray</button>
            </div>
          </article>

          <article class="panel">
            <h2>Global Hotkey</h2>
            <label>
              Accelerator
              <input id="shortcut-accelerator" value="Ctrl+Shift+K" />
            </label>
            <div class="actions">
              <button id="register-shortcut">Register Hotkey</button>
              <button class="secondary" id="unregister-shortcut">Unregister Hotkey</button>
              <button class="secondary" id="list-shortcuts">List Hotkeys</button>
            </div>
          </article>
        </div>

        <aside class="panel">
          <h2>Runtime Log</h2>
          <p class="status" id="status-line">
            Waiting for runtime events.
          </p>
          <ol id="event-log"></ol>
        </aside>
      </section>
    </main>

    <script>
      (() => {
        const app = window.__MoonBit__;
        const statusLine = document.getElementById("status-line");
        const eventLog = document.getElementById("event-log");

        const notificationTitle = document.getElementById("notification-title");
        const notificationLevel = document.getElementById("notification-level");
        const notificationBody = document.getElementById("notification-body");
        const trayTooltip = document.getElementById("tray-tooltip");
        const shortcutAccelerator = document.getElementById("shortcut-accelerator");

        const appendLog = (label, payload) => {
          const item = document.createElement("li");
          item.innerHTML =
            "<strong>" +
            label +
            "</strong><br><code>" +
            JSON.stringify(payload) +
            "</code>";
          eventLog.prepend(item);
          statusLine.textContent = label;
        };

        const bindAction = (id, fn) => {
          document.getElementById(id).addEventListener("click", async () => {
            try {
              const payload = await fn();
              appendLog(id, payload);
            } catch (error) {
              appendLog(id + " failed", { message: String(error) });
            }
          });
        };

        app.events.on("notification.activity", (event) => {
          appendLog("notification.activity", event);
        });
        app.events.on("tray.activity", (event) => {
          appendLog("tray.activity", event);
        });
        app.events.on("globalHotkey.activity", (event) => {
          appendLog("globalHotkey.activity", event);
        });
        app.events.on("globalHotkey.triggered", (event) => {
          appendLog("globalHotkey.triggered", event);
        });

        bindAction("show-notification", () =>
          app.notification.show({
            title: notificationTitle.value.trim(),
            body: notificationBody.value.trim(),
            level: notificationLevel.value.trim() || null,
          }),
        );

        bindAction("show-tray", () =>
          app.tray.show({
            tooltip: trayTooltip.value.trim(),
          }),
        );

        bindAction("set-tray-tooltip", () =>
          app.tray.setTooltip({
            tooltip: trayTooltip.value.trim(),
          }),
        );

        bindAction("hide-tray", () => app.tray.hide({}));

        bindAction("register-shortcut", () =>
          app.globalHotkey.register({
            accelerator: shortcutAccelerator.value.trim(),
          }),
        );

        bindAction("unregister-shortcut", () =>
          app.globalHotkey.unregister({
            accelerator: shortcutAccelerator.value.trim(),
          }),
        );

        bindAction("list-shortcuts", () => app.globalHotkey.list({}));
      })();
    </script>
  </body>
</html>
